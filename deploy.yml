---
- name: Deploy E-commerce App
  hosts: linux_servers
  become: yes
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
    - name: Install Nginx
      apt:
        name: nginx
        state: present
    - name: Install Node.js
      shell: "curl -fsSL https://deb.nodesource.com/setup_18.x | bash - && apt-get install -y nodejs"
    - name: Install MongoDB
      apt:
        name: mongodb
        state: present
